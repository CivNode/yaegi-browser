name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        # Code uses range-over-int (1.26 feature); only test on 1.26+.
        go: ['1.26']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go vet ./...
      - run: go test ./... -race -count=1 -cover

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go install mvdan.cc/gofumpt@latest
      - run: gofumpt -l -d . | tee /tmp/gofumpt-out && test ! -s /tmp/gofumpt-out
      # golangci-lint bundles its own Go toolchain and refuses to analyse
      # modules that target a newer Go version than it was built with.
      # v2.11.4 (Mar 2026) is built against go1.26 and handles this repo.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4

  wasm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build wasm
        run: make wasm
      - name: Enforce size budget
        run: make sizecheck
      - name: Run Node harness
        run: node testharness/node.mjs
      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yaegi-wasm
          path: |
            dist/yaegi.wasm
            dist/wasm_exec.js
            dist/yaegi.manifest.json
