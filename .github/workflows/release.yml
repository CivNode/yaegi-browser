name: Release

# Fires on any semver tag push. Builds yaegi.wasm + the loader + manifest,
# then attaches them to the GitHub release named after the tag.
#
# Downstream: CivNode's Training / Always-on Sandbox pulls these artifacts
# via `gh release download <tag> -R CivNode/yaegi-browser`.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # github.ref_name is the tag itself here (e.g. "v0.1.0"). Pass it via
      # env so the shell never sees an unescaped GH template expansion.
      - name: Build WASM + manifest
        env:
          VERSION: ${{ github.ref_name }}
        run: make release

      - name: Verify artifacts
        run: |
          ls -la dist/
          test -f dist/yaegi.wasm
          test -f dist/wasm_exec.js
          test -f dist/yaegi.manifest.json
          cat dist/yaegi.manifest.json

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Automated release. See dist/yaegi.manifest.json for build details."
          fi
          gh release upload "$TAG" \
            dist/yaegi.wasm \
            dist/wasm_exec.js \
            dist/yaegi.manifest.json \
            --clobber
